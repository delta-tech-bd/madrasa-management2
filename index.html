<!DOCTYPE html>
<html lang="bn">
<head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>মাদ্রাসা ম্যানেজমেন্ট সিস্টেম</title> 
   
    <!-- ফেভিকন আইকন --> 
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/19lUSAdtY0qnUtoVPmmPqhbVaMtMIzYsh=w1000" />
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        /* গ্লোবাল স্টাইল এবং ফন্ট ফিক্স */ 
        * { 
            box-sizing: border-box; 
            font-family: 'SolaimanLipi', sans-serif !important; 
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: #0f172a;
            color: #1e293b; 
        }
        
        /* ব্যাকগ্রাউন্ড ওভারলে ও কার্ড ডিজাইন */
        .login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 99999; 
            padding: 20px; 
            background: #f8fafc;
        }
        .login-overlay.show { display: flex; }
        .login-card { 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid #e2e8f0; 
        }
        .madrasa-logo { 
            width: 90px; 
            height: 90px; 
            margin-bottom: 16px; 
            object-fit: contain; 
        }
        .login-card h2 { 
            margin: 0 0 8px 0; 
            font-size: 24px; 
            font-weight: 700;
            color: #0f172a; 
        }
        .login-card p { 
            margin: 0 0 24px 0; 
            color: #64748b; 
            font-size: 14px; 
            line-height: 1.5;
        }
        
        /* অ্যালার্ট ও এরর মেসেজ */
        .error-msg { 
            background: #fef2f2; 
            border: 1px solid #fecaca; 
            color: #dc2626; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            display: none; 
            text-align: center; 
        }
        
        /* ইনপুট গ্রুপ স্টাইল */
        .input-group { 
            margin-bottom: 18px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 14px; 
            color: #334155; 
            font-weight: 600;
        }
        .input-group input { 
            width: 100%; 
            padding: 12px 16px; 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            color: #0f172a; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s ease; 
        }
        .input-group input::placeholder {
            color: #94a3b8;
        }
        .input-group input:focus { 
            border-color: #0284c7; 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); 
        }

        /* পাসওয়ার্ড শো/হাইড টগল স্টাইল */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 46px;
        }
        .toggle-pass-btn {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 4px;
            color: #64748b;
            user-select: none;
        }
        .toggle-pass-btn:hover { color: #0284c7; }
        
        /* বাটন ডিজাইন */
        .login-btn { 
            width: 100%; 
            padding: 14px; 
            background: #0284c7; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s ease; 
            margin-top: 6px; 
        }
        .login-btn:hover { background: #0369a1; }
        .login-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        /* সেশন লোডার */
        #bootLoader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 12px; z-index: 100000;
            background: #ffffff;
        }
        #bootLoader .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #0284c7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #bootLoader span { color: #64748b; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* মেইন কনটেইনার ও আইফ্রেম (Safe Area Dynamic Padding) */
        .main-container { 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            display: none; 
            background-color: #0f172a;
            padding-top: env(safe-area-inset-top, 35px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #0f172a; 
        }
    </style>
</head>
<body>

    <div id="bootLoader">
        <div class="spinner"></div>
        <span>সেশন যাচাই করা হচ্ছে…</span>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card" id="loginCardContainer">
            <img src="https://lh3.googleusercontent.com/d/19xL7quoZwFVMc39HW3po7PhbD3t5w-ES=w1000" alt="Madrasa Logo" class="madrasa-logo" />
            <h2>লাইসেন্স ভেরিফিকেশন</h2>
            <p>সফটওয়্যারটি ব্যবহার করতে ইউজারনেম ও পাসওয়ার্ড দিন</p>
            
            <div class="error-msg" id="errorBlock"></div>
            
            <div class="input-group">
                <label for="username">ইউজারনেম / ফোন নম্বর</label>
                <input type="text" id="username" placeholder="যেমন: manikpir" required /> 
            </div>
            
            <div class="input-group">
                <label for="licenseKey">পাসওয়ার্ড</label>
                <div class="password-wrapper">
                    <input type="password" id="licenseKey" placeholder="যেমন: manikpir@94" required />
                    <button type="button" class="toggle-pass-btn" id="togglePassBtn" onclick="togglePasswordVisibility()" aria-label="পাসওয়ার্ড দেখুন/লুকান">👁️</button>
                </div>
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="performSecureLogin()">🔑 প্রবেশ করুন</button>
        </div>
    </div>

    <div class="main-container" id="mainAppContainer"> 
        <iframe id="appIframe" src=""></iframe>
    </div>

    <script>
        var GOOGLE_SCRIPT_API = "https://script.google.com/macros/s/AKfycbzPgndi8eNkTT_nuNn1vwmrJ41stf7hnBaVvfiUOTpuQ14xl5BXJEJ8rWvWvNNy8wAw/exec";
        var SESSION_STORAGE_KEY = 'sms_session_token';

        function getSavedSession() {
            try { return localStorage.getItem(SESSION_STORAGE_KEY); } catch (e) { return null; }
        }
        function saveSession(token) {
            try { if (token) localStorage.setItem(SESSION_STORAGE_KEY, token); } catch (e) {}
        }
        function clearSavedSession() {
            try { localStorage.removeItem(SESSION_STORAGE_KEY); } catch (e) {}
        }

        function hideBootLoader() {
            var loader = document.getElementById('bootLoader');
            if (loader) loader.style.display = 'none';
        }
        function showLoginForm() {
            hideBootLoader();
            document.getElementById('loginOverlay').classList.add('show');
        }
        function openApp() {
            hideBootLoader();
            document.getElementById('loginOverlay').classList.remove('show');
            document.getElementById('appIframe').src = GOOGLE_SCRIPT_API + "?loadApp=true";
            document.getElementById('mainAppContainer').style.display = 'block';
        }

        /* পাসওয়ার্ড শো/হাইড টগল ফাংশন */
        function togglePasswordVisibility() {
            var pwField = document.getElementById('licenseKey');
            var btn = document.getElementById('togglePassBtn');
            if (pwField.type === 'password') {
                pwField.type = 'text';
                btn.innerText = '🙈';
            } else {
                pwField.type = 'password';
                btn.innerText = '👁️';
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);

            if (urlParams.get('status') === 'denied') {
                hideBootLoader();
                document.getElementById('loginOverlay').classList.add('show');
                document.getElementById('loginCardContainer').innerHTML = `
                    <div style="font-size: 60px; margin-bottom: 12px;">🔒</div>
                    <h2 style="color: #dc2626; margin-bottom: 8px;">অ্যাক্সেস অস্বীকৃত!</h2>
                    <div style="background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 18px; font-weight: bold; text-align: center;">
                        🚨 সরাসরি লিংকে প্রবেশ করা সম্পূর্ণ নিষিদ্ধ।
                    </div>
                    <p style="color: #64748b; font-size: 14px; line-height: 1.5; margin-bottom: 20px;">
                        নি নিরাপত্তাজনিত কারণে এই ক্লাউড সার্ভার ইউআরএলটি লক করা হয়েছে।
                    </p>
                    <button class="login-btn" onclick="window.location.href=window.location.pathname">
                        🔄 মূল লগইন পেজে ফিরুন
                    </button>
                `;
                return;
            }

            var savedToken = getSavedSession();
            if (!savedToken) {
                showLoginForm();
                return;
            }

            fetch(GOOGLE_SCRIPT_API + "?session=" + encodeURIComponent(savedToken))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.success) {
                        if (data.session) saveSession(data.session);
                        openApp();
                    } else {
                        clearSavedSession();
                        showLoginForm();
                    }
                })
                .catch(function() {
                    showLoginForm();
                });
        });

        function showMsg(text) {
            var errBlock = document.getElementById('errorBlock');
            errBlock.innerText = text;
            errBlock.style.display = 'block';
        }

        function performSecureLogin() {
            var userField = document.getElementById('username').value.trim();
            var keyField  = document.getElementById('licenseKey').value.trim();
            var btn = document.getElementById('loginBtn');
            var errBlock = document.getElementById('errorBlock');

            if (!userField || !keyField) {
                showMsg('❌ অনুগ্রহ করে ইউজারনেম এবং পাসওয়ার্ড দুটোই সঠিকভাবে লিখুন।');
                return;
            }

            errBlock.style.display = 'none';
            btn.innerText = "যাচাই করা হচ্ছে...";
            btn.disabled = true;

            var requestUrl = GOOGLE_SCRIPT_API + "?user=" + encodeURIComponent(userField) + "&key=" + encodeURIComponent(keyField);

            fetch(requestUrl)
                .then(response => response.json())
                .then(data => {
                    if (data && data.success) {
                        btn.innerText = "🎉 লগইন সফল!";
                        if (data.session) saveSession(data.session);
                        openApp();
                    } else {
                        showMsg("❌ " + (data.error ? data.error : "ভুল ইউজার আইডি অথবা পাসওয়ার্ড!"));
                        btn.innerText = "🔑 প্রবেশ করুন";
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    showMsg("❌ সার্ভার সংযোগে সমস্যা হয়েছে! আবার চেষ্টা করুন।");
                    btn.innerText = "🔑 প্রবেশ করুন";
                    btn.disabled = false;
                });
        }

        document.getElementById('licenseKey').addEventListener('keypress', function(e) { if (e.key === 'Enter') { performSecureLogin(); } });
        document.getElementById('username').addEventListener('keypress', function(e) { if (e.key === 'Enter') { performSecureLogin(); } });
    </script>

    <!-- সিকিউরিটি স্ক্রিপ্ট -->
    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
        };
    </script>
</body>
</html>
