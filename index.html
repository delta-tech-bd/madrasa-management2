    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #0f172a; /* আপনার অ্যাপের ব্যাকগ্রাউন্ড কালারের সাথে মিলিয়ে দিতে পারেন */

            position: absolute;
            top: -55px; /* গুগলের ব্যানারটি স্ক্রিনের ওপরে লুকিয়ে ফেলার জন্য */

            width: 100%;
            height: calc(100% + 55px); 
            border: none;
        }
    </style>
</head>
