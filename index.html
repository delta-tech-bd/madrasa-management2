<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>মানিকপীর হাফেজ্জীয়া মাদ্রাসা - ড্যাশবোর্ড</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            overflow: hidden;
        }
        /* মূল কন্টেইনার যা মোবাইল স্ক্রিনকে লক করে রাখবে */
        .dashboard-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        /* আইফ্রেম রেসপনসিভ সেটিংস */
        iframe {
            display: block;
            width: 100%;
            height: calc(100% + 55px); /* গুগলের ওপরে থাকা কালো বারটি সরানোর জন্য */
            position: absolute;
            top: -55px;
            left: 0;
            border: none;
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <iframe 
            id="app-frame"
            src="https://script.google.com/macros/s/AKfycbyd6kNtz3Usc6FdK0hsJPd0mP0ozOdAFYY-72WZOrOO91WScqG7lmnsdn-yvH16oXFh/exec"
            allow="cross-origin-isolated">
        </iframe>
    </div>

    <script>
        // মোবাইল ব্রাউজারকে ফোর্স রিফ্রেশ করিয়ে ডেটা লোড করার ট্রিক
        window.addEventListener('DOMContentLoaded', function() {
            var frame = document.getElementById('app-frame');
            if (frame) {
                // ২00 মিলিসেকেন্ড পর ফ্রেমটি আবার রিলোড হবে যেন ক্যাশ ব্লক ভেঙে যায়
                setTimeout(function() {
                    frame.src = frame.src;
                }, 200);
            }
        });
    </script>

</body>
</html>
